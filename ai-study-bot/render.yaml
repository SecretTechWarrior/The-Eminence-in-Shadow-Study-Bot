services:
  - type: worker
    name: ai-study-bot
    runtime: python
    buildCommand: pip install -r bot/requirements.txt
    startCommand: python bot/src/main.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
